<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>档案 | 音乐工厂</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="../assets/simple-site.css" />
</head>
<body>
  <header class="site-header">
    <nav class="wrap nav">
      <a class="brand" href="../index.html">音乐工厂</a>
      <div class="links">
        <a href="../index.html">首页</a>
        <a href="../works/index.html">歌曲</a>
        <a href="../albums/index.html">专辑</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="wrap">
        <p class="eyebrow">档案</p>
        <h1>歌曲档案</h1>
        <p class="lead">这里保留简单记录：歌曲、歌手、分类、更新时间和试听入口。不再做复杂记忆空间。</p>
      </div>
    </section>

    <section class="section">
      <div class="wrap">
        <div class="grid-2" data-records></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="wrap">
      <span>档案</span>
      <span><a href="../index.html">返回首页</a></span>
    </div>
  </footer>

  <script src="../songs-data.js"></script>
  <script>
    const songs = (window.MUSIC_FACTORY_SONGS || [])
      .slice()
      .sort((a, b) => String(b.updated || "").localeCompare(String(a.updated || "")));
    document.querySelector("[data-records]").innerHTML = songs.map(song => `
      <article class="card">
        <div class="meta">${song.updated || "未记录时间"} · ${song.artist || "未标注"}</div>
        <h3>${song.title}</h3>
        <p>${song.collection || "未归类"} / ${song.category || "歌曲"}</p>
        ${song.audioUrl ? `<a class="small-link" href="${song.audioUrl}" target="_blank" rel="noopener noreferrer">试听音频</a>` : `<span class="small-link">音频整理中</span>`}
      </article>
    `).join("");
  </script>
</body>
</html>
