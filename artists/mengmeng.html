<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>梦梦 | 音乐工厂</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="../assets/simple-site.css" />
</head>
<body>
  <header class="site-header">
    <nav class="wrap nav">
      <a class="brand" href="../index.html">音乐工厂</a>
      <div class="links">
        <a href="../index.html">首页</a>
        <a href="../works/index.html">歌曲</a>
        <a href="../albums/index.html">专辑</a>
        <a href="../archive/index.html">档案</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="wrap hero-grid">
        <div>
          <p class="eyebrow">AI 歌手</p>
          <h1>梦梦</h1>
          <p class="lead">梦梦的作品更接近旅途、自然、山河和人的故事。她的音乐适合慢慢听，像从风景里长出来的叙事歌曲。</p>
          <div class="actions">
            <a class="btn primary" href="#songs">听作品</a>
            <a class="btn" href="../works/index.html?artist=梦梦">全部作品</a>
          </div>
        </div>
        <aside class="note-panel">
          <h3>声音特点</h3>
          <p>自然感、辽阔感、故事感，常以山河、等待、归途和生命经验展开。</p>
        </aside>
      </div>
    </section>

    <section class="section" id="songs">
      <div class="wrap">
        <div class="section-head">
          <h2>梦梦作品</h2>
          <p>点击播放器即可试听。</p>
        </div>
        <div class="song-grid" data-song-grid></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="wrap">
      <span>梦梦 · 音乐工厂</span>
      <span><a href="../index.html">首页</a> / <a href="../works/index.html">歌曲</a></span>
    </div>
  </footer>

  <script src="../songs-data.js"></script>
  <script>
    const ARTIST = "梦梦";
    const fallbackCover = "../assets/generated/music-map-mengmeng.webp";
    const clean = value => String(value || "").replace(/\s+/g, " ").trim();
    const songs = (window.MUSIC_FACTORY_SONGS || []).filter(song => song.artist === ARTIST);
    document.querySelector("[data-song-grid]").innerHTML = songs.map(song => {
      const cover = song.cover ? "../" + song.cover.replace(/^\.\.\//, "") : fallbackCover;
      return `
        <article class="song-card">
          <div class="cover" style="background-image:url('${cover.replace(/'/g, "%27")}')"></div>
          <div class="song-body">
            <div class="meta">${song.collection || "作品"} · ${song.variant || song.version || ""}</div>
            <div class="song-title">${song.title}</div>
            <p class="intro">${clean(song.intro || song.lyricsPreview).slice(0, 130) || "作品介绍整理中。"}</p>
            ${song.audioUrl ? `<audio controls preload="metadata" src="${song.audioUrl}"></audio>` : `<p class="intro">试听音频整理中。</p>`}
            <a class="small-link" href="${song.audioUrl || "../works/index.html?artist=梦梦"}" target="_blank" rel="noopener noreferrer">打开音频</a>
          </div>
        </article>`;
    }).join("") || `<div class="card"><p>梦梦作品正在整理中。</p></div>`;
  </script>
</body>
</html>
