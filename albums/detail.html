<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Album Detail | Music Factory</title>
  <link rel="icon" href="data:," />
  <style>
    :root{--font-display:"Didot","Bodoni 72","Songti SC","STSong",Georgia,serif;--font-body:"Inter","SF Pro Text","Helvetica Neue","Microsoft YaHei",system-ui,sans-serif;--font-caption:"SF Pro Text","Helvetica Neue","Microsoft YaHei",system-ui,sans-serif;--warm-white:#f7f3ea;--paper:#fffdf8;--charcoal:#14120f;--warm-gray:#766f63;--dark-gold:#a58a56;--line:rgba(20,18,15,.13);font-family:var(--font-body)}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;color:var(--charcoal);background:linear-gradient(180deg,#fbf8f1,#eee4d4);animation:pageArrival 760ms cubic-bezier(.19,1,.22,1) both}a{color:inherit;text-decoration:none}.wrap{width:min(1120px,calc(100% - 32px));margin:0 auto}.nav{min-height:72px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}.brand,.links a,.eyebrow,.label,.action{font:800 11px/1.4 var(--font-caption);letter-spacing:.14em;text-transform:uppercase}.links{display:flex;gap:16px;flex-wrap:wrap;color:var(--warm-gray)}.hero{padding:104px 0 72px;display:grid;grid-template-columns:320px 1fr;gap:56px;align-items:end}.cover{aspect-ratio:1;background:rgba(255,253,248,.7);border:1px solid var(--line);display:grid;place-items:center;color:var(--warm-gray);overflow:hidden}.cover img{width:100%;height:100%;object-fit:cover;transition:transform 1.2s cubic-bezier(.19,1,.22,1)}.cover:hover img{transform:scale(1.035)}.eyebrow,.label{color:var(--dark-gold)}h1{font:500 clamp(56px,9vw,126px)/.88 var(--font-display);margin:12px 0 24px}.story{color:var(--warm-gray);font-size:18px;line-height:1.8}.works{border-top:1px solid var(--line)}.work{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:24px;padding:28px 0;border-bottom:1px solid var(--line);transition:padding .75s cubic-bezier(.19,1,.22,1)}.work:hover{padding-left:16px}.work h2{font:500 34px/1 var(--font-display);margin:0 0 8px}.work p{margin:0;color:var(--warm-gray);line-height:1.7}.action{border-bottom:1px solid currentColor;padding-bottom:7px;align-self:center}.routes{display:flex;gap:16px;flex-wrap:wrap;padding:48px 0 88px}@keyframes pageArrival{from{opacity:0;filter:blur(7px)}to{opacity:1;filter:blur(0)}}@media(max-width:760px){body{animation-duration:520ms}.nav{align-items:flex-start;flex-direction:column;padding:18px 0}.hero{grid-template-columns:1fr;padding:64px 0;gap:32px}.work{grid-template-columns:1fr}.work:hover{padding-left:0}}
  </style>
  <link rel="stylesheet" href="../assets/visual-system-v3.css" />
</head>
<body>
  <nav class="wrap nav">
    <a class="brand" href="../index.html">Music Factory</a>
    <div class="links">
      <a href="../index.html">Back to Civilization</a>
      <a href="../albums/index.html">Albums</a>
      <a href="../works/index.html">Works</a>
      <a href="../archive/index.html">View Archive</a>
    </div>
  </nav>
  <main class="wrap" data-detail></main>
  <script src="../src/content/music-catalog.js"></script>
  <script>
    const catalog = window.MUSIC_FACTORY_CATALOG;
    const id = new URLSearchParams(location.search).get("id") || catalog.albums[0].id;
    const album = catalog.albums.find(item => item.id === id) || catalog.albums[0];
    const works = catalog.works.filter(work => album.workIds.includes(work.id));
    document.title = `${album.title} | Albums | Music Factory`;
    document.querySelector("[data-detail]").innerHTML = `
      <header class="hero">
        <div class="cover">${album.cover ? `<img src="${album.cover}" alt="${album.title} cover" decoding="async" fetchpriority="high">` : `<span>${album.coverStatus}</span>`}</div>
        <div>
          <p class="eyebrow">Album Memory</p>
          <h1>${album.title}</h1>
          <p class="story">${album.story}</p>
          <p class="story">${album.artist} / ${album.realm} / ${album.status}</p>
        </div>
      </header>
      <section class="works">
        ${works.map(work => `<article class="work"><div><h2>${work.title}</h2><p>${work.description}</p></div><a class="action" href="../works/detail.html?id=${work.id}">Follow the Work</a></article>`).join("")}
      </section>
      <div class="routes">
        <a class="action" href="../works/index.html?artist=${album.artistId}">Enter World Works</a>
        <a class="action" href="../archive/index.html?album=${album.id}">View Archive</a>
        <a class="action" href="../sound-civilization-map.html">Explore Map</a>
      </div>
    `;
  </script>
</body>
</html>
