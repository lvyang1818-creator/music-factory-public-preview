<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>专辑详情 | 音乐工厂</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="../assets/simple-site.css" />
</head>
<body>
  <header class="site-header">
    <nav class="wrap nav">
      <a class="brand" href="../index.html">音乐工厂</a>
      <div class="links">
        <a href="../index.html">首页</a>
        <a href="index.html">专辑</a>
        <a href="../works/index.html">歌曲</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="wrap">
        <p class="eyebrow">专辑详情</p>
        <h1 data-title>专辑</h1>
        <p class="lead">这里显示同一作品集合下的歌曲。</p>
      </div>
    </section>
    <section class="section">
      <div class="wrap song-grid" data-song-grid></div>
    </section>
  </main>

  <script src="../songs-data.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const name = params.get("name") || "无相";
    const songs = (window.MUSIC_FACTORY_SONGS || []).filter(song => (song.collection || "未归类作品") === name);
    const fallbackCover = "../assets/generated/music-map-guanwujie.webp";
    document.querySelector("[data-title]").textContent = name;
    document.querySelector("[data-song-grid]").innerHTML = songs.map(song => {
      const cover = song.cover ? "../" + song.cover.replace(/^\.\.\//, "") : fallbackCover;
      return `
        <article class="song-card">
          <div class="cover" style="background-image:url('${cover.replace(/'/g, "%27")}')"></div>
          <div class="song-body">
            <div class="meta">${song.artist || "未标注"}</div>
            <div class="song-title">${song.title}</div>
            ${song.audioUrl ? `<audio controls preload="metadata" src="${song.audioUrl}"></audio>` : `<p class="intro">试听音频整理中。</p>`}
          </div>
        </article>`;
    }).join("") || `<div class="card"><p>没有找到这个专辑的歌曲。</p></div>`;
  </script>
</body>
</html>
