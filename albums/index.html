<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>专辑 | 音乐工厂</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="../assets/simple-site.css" />
</head>
<body>
  <header class="site-header">
    <nav class="wrap nav">
      <a class="brand" href="../index.html">音乐工厂</a>
      <div class="links">
        <a href="../index.html">首页</a>
        <a href="../works/index.html">歌曲</a>
        <a href="../archive/index.html">档案</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="wrap">
        <p class="eyebrow">专辑</p>
        <h1>专辑与作品集</h1>
        <p class="lead">按作品集合浏览歌曲。这里使用现有歌曲数据里的 collection 字段生成，不再做复杂专辑系统。</p>
      </div>
    </section>

    <section class="section">
      <div class="wrap">
        <div class="grid-2" data-albums></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="wrap">
      <span>专辑</span>
      <span><a href="../index.html">返回首页</a></span>
    </div>
  </footer>

  <script src="../songs-data.js"></script>
  <script>
    const songs = window.MUSIC_FACTORY_SONGS || [];
    const groups = new Map();
    for (const song of songs) {
      const key = song.collection || "未归类作品";
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(song);
    }
    document.querySelector("[data-albums]").innerHTML = [...groups.entries()].map(([name, list]) => {
      const artists = [...new Set(list.map(song => song.artist || "未标注"))].join(" / ");
      const playable = list.filter(song => song.audioUrl).length;
      return `
        <article class="card">
          <h3>${name}</h3>
          <p>${artists}</p>
          <p>共 ${list.length} 首，${playable} 首可试听。</p>
          <a class="small-link" href="../works/index.html">查看歌曲</a>
        </article>`;
    }).join("");
  </script>
</body>
</html>
