<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Albums | Music Factory</title>
  <link rel="icon" href="data:," />
  <style>
    :root{--font-display:"Didot","Bodoni 72","Songti SC","STSong",Georgia,serif;--font-body:"Inter","SF Pro Text","Helvetica Neue","Microsoft YaHei",system-ui,sans-serif;--font-caption:"SF Pro Text","Helvetica Neue","Microsoft YaHei",system-ui,sans-serif;--warm-white:#f7f3ea;--paper:#fffdf8;--charcoal:#14120f;--warm-gray:#766f63;--dark-gold:#a58a56;--line:rgba(20,18,15,.13);font-family:var(--font-body)}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;color:var(--charcoal);background:linear-gradient(180deg,#fbf8f1,#efe5d5);animation:pageArrival 760ms cubic-bezier(.19,1,.22,1) both}a{color:inherit;text-decoration:none}.wrap{width:min(1180px,calc(100% - 32px));margin:0 auto}.nav{min-height:72px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}.brand,.links a,.eyebrow,.meta,.action{font:800 11px/1.4 var(--font-caption);letter-spacing:.14em;text-transform:uppercase}.links{display:flex;gap:16px;flex-wrap:wrap;color:var(--warm-gray)}.hero{padding:104px 0 80px}.eyebrow{color:var(--dark-gold);margin:0 0 16px}h1{font:500 clamp(60px,10vw,132px)/.88 var(--font-display);margin:0 0 24px}.lead{max-width:720px;color:var(--warm-gray);font-size:18px;line-height:1.8}.albums{display:grid;gap:40px}.album{display:grid;grid-template-columns:280px 1fr;gap:40px;border-top:1px solid var(--line);padding:38px 0;transition:padding .75s cubic-bezier(.19,1,.22,1)}.album:hover{padding-left:18px}.cover{aspect-ratio:1;background:rgba(255,253,248,.68);border:1px solid var(--line);display:grid;place-items:center;color:var(--warm-gray);overflow:hidden}.cover img{width:100%;height:100%;object-fit:cover;transition:transform 1.2s cubic-bezier(.19,1,.22,1)}.album:hover .cover img{transform:scale(1.035)}.album h2{font:500 clamp(38px,6vw,84px)/.9 var(--font-display);margin:0 0 18px}.album p{color:var(--warm-gray);line-height:1.75}.meta{color:var(--dark-gold)}.action{display:inline-block;margin-top:14px;border-bottom:1px solid currentColor;padding-bottom:7px}@keyframes pageArrival{from{opacity:0;filter:blur(7px)}to{opacity:1;filter:blur(0)}}@media(max-width:760px){body{animation-duration:520ms}.nav{align-items:flex-start;flex-direction:column;padding:18px 0}.hero{padding:64px 0}.albums{gap:28px}.album{grid-template-columns:1fr;padding:32px 0}.album:hover{padding-left:0}}
  </style>
  <link rel="stylesheet" href="../assets/visual-system-v3.css" />
</head>
<body>
  <nav class="wrap nav">
    <a class="brand" href="../index.html">Music Factory</a>
    <div class="links">
      <a href="../index.html">Back to Civilization</a>
      <a href="../works/index.html">Works</a>
      <a href="../sound-civilization-map.html">Explore Map</a>
      <a href="../archive/index.html">View Archive</a>
    </div>
  </nav>
  <main>
    <header class="wrap hero">
      <p class="eyebrow">Albums System</p>
      <h1>Albums</h1>
      <p class="lead">Albums are civilization chapter collections. Each album preserves artist ownership, realm context, story, cover state, and archive route.</p>
    </header>
    <section class="wrap albums" data-albums></section>
  </main>
  <script src="../src/content/music-catalog.js"></script>
  <script>
    const catalog = window.MUSIC_FACTORY_CATALOG;
    document.querySelector("[data-albums]").innerHTML = catalog.albums.map(album => `
      <article class="album">
        <div class="cover">${album.cover ? `<img src="${album.cover}" alt="${album.title} cover" loading="lazy" decoding="async">` : `<span>${album.coverStatus}</span>`}</div>
        <div>
          <div class="meta">${album.artist} / ${album.realm} / ${album.status}</div>
          <h2>${album.title}</h2>
          <p>${album.story}</p>
          <a class="action" href="detail.html?id=${album.id}">Open Album Memory</a>
        </div>
      </article>
    `).join("");
  </script>
</body>
</html>
