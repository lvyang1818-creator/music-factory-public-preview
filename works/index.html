<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>全部歌曲 | 音乐工厂</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="../assets/simple-site.css" />
</head>
<body>
  <header class="site-header">
    <nav class="wrap nav">
      <a class="brand" href="../index.html">音乐工厂</a>
      <div class="links">
        <a href="../index.html">首页</a>
        <a href="../artists/guanwujie.html">观无界</a>
        <a href="../artists/shiliyin.html">十里音</a>
        <a href="../artists/mengmeng.html">梦梦</a>
        <a href="../albums/index.html">专辑</a>
        <a href="../archive/index.html">档案</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="wrap">
        <p class="eyebrow">歌曲</p>
        <h1>全部歌曲</h1>
        <p class="lead">按歌手筛选，直接试听。这里不再隐藏在复杂地图或档案路径里。</p>
      </div>
    </section>

    <section class="section">
      <div class="wrap">
        <div class="filters" data-filters></div>
        <div class="song-grid" data-song-grid></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="wrap">
      <span>全部歌曲</span>
      <span><a href="../index.html">返回首页</a></span>
    </div>
  </footer>

  <script src="../songs-data.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const selected = params.get("artist") || "全部";
    const artists = ["全部", "观无界", "十里音", "梦梦", "未标注"];
    const fallbackCover = "../assets/generated/music-map-guanwujie.webp";
    const clean = value => String(value || "").replace(/\s+/g, " ").trim();
    const allSongs = window.MUSIC_FACTORY_SONGS || [];
    const songs = selected === "全部" ? allSongs : allSongs.filter(song => (song.artist || "未标注") === selected);

    document.querySelector("[data-filters]").innerHTML = artists.map(name =>
      `<a class="filter ${name === selected ? "active" : ""}" href="index.html${name === "全部" ? "" : `?artist=${encodeURIComponent(name)}`}">${name}</a>`
    ).join("");

    document.querySelector("[data-song-grid]").innerHTML = songs.map(song => {
      const cover = song.cover ? "../" + song.cover.replace(/^\.\.\//, "") : fallbackCover;
      return `
        <article class="song-card">
          <div class="cover" style="background-image:url('${cover.replace(/'/g, "%27")}')"></div>
          <div class="song-body">
            <div class="meta">${song.artist || "未标注"} · ${song.collection || "作品"}</div>
            <div class="song-title">${song.title}</div>
            <p class="intro">${clean(song.intro || song.lyricsPreview).slice(0, 130) || "作品介绍整理中。"}</p>
            ${song.audioUrl ? `<audio controls preload="metadata" src="${song.audioUrl}"></audio>` : `<p class="intro">试听音频整理中。</p>`}
            ${song.audioUrl ? `<a class="small-link" href="${song.audioUrl}" target="_blank" rel="noopener noreferrer">打开音频</a>` : ""}
          </div>
        </article>`;
    }).join("") || `<div class="card"><p>暂无歌曲。</p></div>`;
  </script>
</body>
</html>
