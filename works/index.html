<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Works | Music Factory</title>
  <link rel="icon" href="data:," />
  <style>
    :root{--font-display:"Didot","Bodoni 72","Songti SC","STSong",Georgia,serif;--font-body:"Inter","SF Pro Text","Helvetica Neue","Microsoft YaHei",system-ui,sans-serif;--font-caption:"SF Pro Text","Helvetica Neue","Microsoft YaHei",system-ui,sans-serif;--warm-white:#f7f3ea;--paper:#fffdf8;--charcoal:#14120f;--warm-gray:#766f63;--dark-gold:#a58a56;--line:rgba(20,18,15,.13);--space-2:16px;--space-3:24px;--space-4:32px;--space-6:48px;--space-8:64px;--space-12:96px;font-family:var(--font-body)}
    *{box-sizing:border-box}html{background:var(--warm-white);scroll-behavior:smooth}body{margin:0;color:var(--charcoal);background:linear-gradient(180deg,#fbf8f1 0%,#f2eadc 100%);animation:pageArrival 760ms cubic-bezier(.19,1,.22,1) both}a{color:inherit;text-decoration:none}.wrap{width:min(1180px,calc(100% - 32px));margin:0 auto}.nav{min-height:72px;display:flex;align-items:center;justify-content:space-between;gap:16px;border-bottom:1px solid var(--line)}.brand,.links a,.eyebrow,.meta{font:800 11px/1.4 var(--font-caption);letter-spacing:.14em;text-transform:uppercase}.links{display:flex;gap:16px;flex-wrap:wrap;color:var(--warm-gray)}.hero{padding:104px 0 80px}.eyebrow{color:var(--dark-gold);margin:0 0 16px}h1{font:500 clamp(60px,10vw,128px)/.88 var(--font-display);margin:0 0 24px}.lead{max-width:720px;color:var(--warm-gray);font-size:18px;line-height:1.8}.toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:40px}.filter{border:1px solid var(--line);background:rgba(255,253,248,.68);padding:10px 12px;font:800 11px/1 var(--font-caption);letter-spacing:.12em;text-transform:uppercase;transition:background .55s ease,color .55s ease,transform .55s ease}.filter:hover{background:var(--charcoal);color:var(--paper);transform:translateY(-2px)}.grid{display:grid;gap:0;border-top:1px solid var(--line)}.work{display:grid;grid-template-columns:minmax(0,.55fr) minmax(0,.35fr) auto;gap:24px;align-items:center;padding:32px 0;border-bottom:1px solid var(--line);transition:padding .75s cubic-bezier(.19,1,.22,1),color .75s cubic-bezier(.19,1,.22,1)}.work:hover{padding-left:18px;color:var(--dark-gold)}.work h2{font:500 clamp(32px,5vw,64px)/.92 var(--font-display);margin:0 0 10px}.work p{margin:0;color:var(--warm-gray);line-height:1.7}.meta{color:var(--dark-gold)}.actions{display:flex;gap:12px;flex-wrap:wrap}.action{border-bottom:1px solid currentColor;padding-bottom:6px;font:800 11px/1 var(--font-caption);letter-spacing:.14em;text-transform:uppercase}.empty{padding:48px 0;color:var(--warm-gray)}footer{padding:72px 0;color:var(--warm-gray)}@keyframes pageArrival{from{opacity:0;filter:blur(7px)}to{opacity:1;filter:blur(0)}}@media(max-width:760px){body{animation-duration:520ms}.nav{align-items:flex-start;flex-direction:column;padding:18px 0}.hero{padding:64px 0}.toolbar{margin-bottom:28px}.work{grid-template-columns:1fr;padding:28px 0}.work:hover{padding-left:0}.actions{margin-top:8px}}
  </style>
  <link rel="stylesheet" href="../assets/visual-system-v3.css" />
</head>
<body>
  <nav class="wrap nav">
    <a class="brand" href="../index.html">Music Factory</a>
    <div class="links">
      <a href="../index.html">Back to Civilization</a>
      <a href="../sound-civilization-map.html">Explore Map</a>
      <a href="../albums/index.html">Open Album Memory</a>
      <a href="../archive/index.html">View Archive</a>
    </div>
  </nav>
  <main>
    <header class="wrap hero">
      <p class="eyebrow">Works System</p>
      <h1>Works</h1>
      <p class="lead">Works are civilization chapters. Each entry is bound to artist knowledge, Sound Map routes, album context, and Archive memory.</p>
    </header>
    <section class="wrap">
      <div class="toolbar" data-filters></div>
      <div class="grid" data-works></div>
    </section>
  </main>
  <footer class="wrap">Works -> Archive -> Sound Civilization Map.</footer>
  <script src="../src/content/music-catalog.js"></script>
  <script>
    const catalog = window.MUSIC_FACTORY_CATALOG;
    const params = new URLSearchParams(location.search);
    const selectedArtist = params.get("artist") || "all";
    const filters = [{ id: "all", name: "All Works" }, ...catalog.artists.map(artist => ({ id: artist.id, name: artist.name }))];
    document.querySelector("[data-filters]").innerHTML = filters.map(filter => `<a class="filter" href="index.html${filter.id === "all" ? "" : `?artist=${filter.id}`}">${filter.name}</a>`).join("");
    const works = selectedArtist === "all" ? catalog.works : catalog.works.filter(work => work.artistId === selectedArtist);
    document.querySelector("[data-works]").innerHTML = works.length ? works.map(work => `
      <article class="work">
        <div>
          <h2>${work.title}</h2>
          <p>${work.description}</p>
        </div>
        <div>
          <div class="meta">${work.artist} / ${work.realm}</div>
          <p>${work.status}</p>
        </div>
        <div class="actions">
          <a class="action" href="detail.html?id=${work.id}">Follow the Work</a>
          <a class="action" href="../archive/index.html?work=${work.id}">View Archive</a>
        </div>
      </article>
    `).join("") : `<div class="empty">No works are available for this artist yet.</div>`;
  </script>
</body>
</html>
