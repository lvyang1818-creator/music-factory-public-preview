<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>歌曲详情 | 音乐工厂</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="../assets/simple-site.css" />
</head>
<body>
  <header class="site-header">
    <nav class="wrap nav">
      <a class="brand" href="../index.html">音乐工厂</a>
      <div class="links">
        <a href="../index.html">首页</a>
        <a href="index.html">歌曲</a>
        <a href="../albums/index.html">专辑</a>
        <a href="../archive/index.html">档案</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="wrap">
        <p class="eyebrow">歌曲详情</p>
        <h1 data-title>歌曲</h1>
        <p class="lead" data-intro>正在读取歌曲信息。</p>
      </div>
    </section>
    <section class="section">
      <div class="wrap grid-2">
        <article class="card" data-player></article>
        <article class="card">
          <h3>歌词</h3>
          <p data-lyrics style="white-space:pre-wrap"></p>
        </article>
      </div>
    </section>
  </main>

  <script src="../songs-data.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const title = params.get("title");
    const songs = window.MUSIC_FACTORY_SONGS || [];
    const song = songs.find(item => item.recordId === id || item.title === title) || songs[0];
    const clean = value => String(value || "").replace(/\s+/g, " ").trim();
    document.title = `${song.title} | 音乐工厂`;
    document.querySelector("[data-title]").textContent = song.title;
    document.querySelector("[data-intro]").textContent = clean(song.fullIntro || song.intro || "作品介绍整理中。");
    document.querySelector("[data-player]").innerHTML = `
      <div class="meta">${song.artist || "未标注"} · ${song.collection || "作品"}</div>
      <h3>${song.title}</h3>
      ${song.audioUrl ? `<audio controls preload="metadata" src="${song.audioUrl}"></audio><p><a class="small-link" href="${song.audioUrl}" target="_blank" rel="noopener noreferrer">打开音频</a></p>` : `<p>试听音频整理中。</p>`}
      <p><a class="small-link" href="index.html${song.artist ? `?artist=${encodeURIComponent(song.artist)}` : ""}">返回歌曲列表</a></p>
    `;
    document.querySelector("[data-lyrics]").textContent = song.lyrics || "暂无歌词。";
  </script>
</body>
</html>
