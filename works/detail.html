<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Work Detail | Music Factory</title>
  <link rel="icon" href="data:," />
  <style>
    :root{--font-display:"Didot","Bodoni 72","Songti SC","STSong",Georgia,serif;--font-body:"Inter","SF Pro Text","Helvetica Neue","Microsoft YaHei",system-ui,sans-serif;--font-caption:"SF Pro Text","Helvetica Neue","Microsoft YaHei",system-ui,sans-serif;--warm-white:#f7f3ea;--paper:#fffdf8;--charcoal:#14120f;--warm-gray:#766f63;--dark-gold:#a58a56;--line:rgba(20,18,15,.13);font-family:var(--font-body)}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;color:var(--charcoal);background:linear-gradient(180deg,#fbf8f1,#eee4d4);animation:pageArrival 760ms cubic-bezier(.19,1,.22,1) both}a{color:inherit;text-decoration:none}.wrap{width:min(1080px,calc(100% - 32px));margin:0 auto}.nav{min-height:72px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}.brand,.links a,.eyebrow,.route{font:800 11px/1.4 var(--font-caption);letter-spacing:.14em;text-transform:uppercase}.links{display:flex;gap:16px;flex-wrap:wrap;color:var(--warm-gray)}.hero{padding:104px 0 64px}.eyebrow{color:var(--dark-gold);margin:0 0 16px}h1{font:500 clamp(60px,10vw,132px)/.88 var(--font-display);margin:0 0 24px}.summary{max-width:760px;color:var(--warm-gray);font-size:18px;line-height:1.8}.panel{border-top:1px solid var(--line);padding:34px 0;display:grid;grid-template-columns:220px 1fr;gap:32px;transition:padding .75s cubic-bezier(.19,1,.22,1)}.panel:hover{padding-left:16px}.label{color:var(--dark-gold);font:800 11px/1.4 var(--font-caption);letter-spacing:.14em;text-transform:uppercase}.value{color:var(--warm-gray);line-height:1.75}.routes{display:flex;gap:16px;flex-wrap:wrap;padding:44px 0 88px}.route{border-bottom:1px solid currentColor;padding-bottom:7px}@keyframes pageArrival{from{opacity:0;filter:blur(7px)}to{opacity:1;filter:blur(0)}}@media(max-width:720px){body{animation-duration:520ms}.nav{align-items:flex-start;flex-direction:column;padding:18px 0}.hero{padding:64px 0}.panel{grid-template-columns:1fr;gap:10px}.panel:hover{padding-left:0}}
  </style>
  <link rel="stylesheet" href="../assets/visual-system-v3.css" />
</head>
<body>
  <nav class="wrap nav">
    <a class="brand" href="../index.html">Music Factory</a>
    <div class="links">
      <a href="../index.html">Back to Civilization</a>
      <a href="../works/index.html">Works</a>
      <a href="../sound-civilization-map.html">Explore Map</a>
      <a href="../archive/index.html">View Archive</a>
    </div>
  </nav>
  <main class="wrap" data-detail></main>
  <script src="../src/content/music-catalog.js"></script>
  <script>
    const catalog = window.MUSIC_FACTORY_CATALOG;
    const id = new URLSearchParams(location.search).get("id") || catalog.works[0].id;
    const work = catalog.works.find(item => item.id === id) || catalog.works[0];
    const album = catalog.albums.find(item => item.id === work.albumId);
    const artist = catalog.artists.find(item => item.id === work.artistId);
    document.title = `${work.title} | Works | Music Factory`;
    document.querySelector("[data-detail]").innerHTML = `
      <header class="hero">
        <p class="eyebrow">Work Chapter</p>
        <h1>${work.title}</h1>
        <p class="summary">${work.description}</p>
      </header>
      <section class="panel"><div class="label">Artist</div><div class="value">${work.artist} / ${work.realm}</div></section>
      <section class="panel"><div class="label">Date / Status</div><div class="value">${work.date} / ${work.status}</div></section>
      <section class="panel"><div class="label">Album</div><div class="value">${album ? `<a href="../albums/detail.html?id=${album.id}">${album.title}</a>` : "No album assigned yet."}</div></section>
      <section class="panel"><div class="label">Knowledge Source</div><div class="value">${work.source}</div></section>
      <section class="panel"><div class="label">Archive</div><div class="value">${work.archiveStatus}</div></section>
      <div class="routes">
        <a class="route" href="${artist ? artist.href : "../sound-civilization-map.html"}">Enter World</a>
        <a class="route" href="../sound-civilization-map.html">Explore Map</a>
        <a class="route" href="../archive/index.html?work=${work.id}">View Archive</a>
      </div>
    `;
  </script>
</body>
</html>
